spring:
  application:
    name: taste-radar-be
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:demo/.env[.properties]
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/taste_radar?characterEncoding=UTF-8&serverTimezone=Asia/Seoul}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
  # 카카오 로그인: https://developers.kakao.com — Redirect URI = {baseUrl}/login/oauth2/code/kakao
  # 브라우저에서 시작: GET /oauth2/authorization/kakao → 로그인 후 JSON으로 accessToken·refreshToken 반환
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  issuer: taste-radar
  secret: ${JWT_SECRET:change-me-use-at-least-256-bits-for-hs256-secret-key-material}
  access-token-validity-ms: 900000
  refresh-token-validity-ms: 1209600000

# 카카오 REST API (주소 → 좌표 변환 등 서버측 호출용)
# 운영에서는 환경변수 KAKAO_REST_API_KEY 로 주입 권장.
kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:}
  pay:
    cid: ${KAKAO_PAY_CID:TC0ONETIME}
    admin-key: ${KAKAO_PAY_ADMIN_KEY:}
    approval-url: ${KAKAO_PAY_APPROVAL_URL:http://localhost:5173/pages/payment/kakao-success.html}
    cancel-url: ${KAKAO_PAY_CANCEL_URL:http://localhost:5173/pages/checkout.html?canceled=1}
    fail-url: ${KAKAO_PAY_FAIL_URL:http://localhost:5173/pages/checkout.html?failed=1}

server:
  port: 8080

# 카카오 로그인 성공 후 프론트엔드 콜백 페이지(토큰을 fragment(#)로 전달)
app:
  oauth-success-redirect: http://localhost:5173/pages/auth/callback.html
  ai:
    gemini-api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash-lite}
    fallback-models: ${GEMINI_FALLBACK_MODELS:gemini-2.5-flash-lite,gemini-2.5-flash}
  upload:
    # 파일이 실제 저장될 디스크 경로 (상대/절대 모두 OK, 없으면 자동 생성)
    dir: ${UPLOAD_DIR:./uploads}
    # 업로드된 파일을 브라우저에서 열 때 사용할 공개 URL prefix
    public-base-url: ${UPLOAD_PUBLIC_BASE_URL:http://localhost:8080/uploads}
