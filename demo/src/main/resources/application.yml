spring:
  application:
    name: taste-radar-be
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:mysql://localhost:3306/taste_radar?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
  # 카카오 로그인: https://developers.kakao.com — Redirect URI = {baseUrl}/login/oauth2/code/kakao
  # 브라우저에서 시작: GET /oauth2/authorization/kakao → 로그인 후 JSON으로 accessToken·refreshToken 반환
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: 99fa6367f556d5862c3e1faeefc5c3f3
            client-secret: 4fDkYhzGTChhA94A25wJe0zEGRr0DyDv
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  issuer: taste-radar
  secret: ${JWT_SECRET:change-me-use-at-least-256-bits-for-hs256-secret-key-material}
  access-token-validity-ms: 900000
  refresh-token-validity-ms: 1209600000

server:
  port: 8080
