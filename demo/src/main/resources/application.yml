spring:
  application:
    name: taste-radar-be
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://localhost:3306/taste_radar?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
  # 카카오 로그인: https://developers.kakao.com — Redirect URI = {baseUrl}/login/oauth2/code/kakao
  # 브라우저에서 시작: GET /oauth2/authorization/kakao → 로그인 후 JSON으로 accessToken·refreshToken 반환
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: 99fa6367f556d5862c3e1faeefc5c3f3
            client-secret: 4fDkYhzGTChhA94A25wJe0zEGRr0DyDv
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  issuer: taste-radar
  secret: ${JWT_SECRET:change-me-use-at-least-256-bits-for-hs256-secret-key-material}
  access-token-validity-ms: 900000
  refresh-token-validity-ms: 1209600000

# 카카오 REST API (주소 → 좌표 변환 등 서버측 호출용)
# 운영에서는 환경변수 KAKAO_REST_API_KEY 로 주입 권장.
kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:99fa6367f556d5862c3e1faeefc5c3f3}

server:
  port: 8080

# 카카오 로그인 성공 후 프론트엔드 콜백 페이지(토큰을 fragment(#)로 전달)
app:
  oauth-success-redirect: http://localhost:5173/pages/auth/callback.html
  upload:
    # 파일이 실제 저장될 디스크 경로 (상대/절대 모두 OK, 없으면 자동 생성)
    dir: ${UPLOAD_DIR:./uploads}
    # 업로드된 파일을 브라우저에서 열 때 사용할 공개 URL prefix
    public-base-url: ${UPLOAD_PUBLIC_BASE_URL:http://localhost:8080/uploads}
